<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Transparência</title>
    <link rel="stylesheet" href="transp.css">
    <script type="module" src="financa.js"></script>
</head>

<body class="tudo">
    <div class="header-section">
        <h1>Painel da Transparência</h1>
        <p>Confira abaixo o detalhamento de todas as receitas e despesas. Nossa missão é manter a clareza e o
            compromisso com cada centavo investido!</p>
    </div>
    <div id="cards-container">
        <div class="loader-container">
            <div class="spinner"></div>
        </div>
    </div>
    <div id="modal-login"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:10px; width:300px;">
            <h3>Acesso Grêmio</h3>
            <input type="email" id="email-gremio" placeholder="Email" style="width:100%; margin-bottom:10px;">
            <input type="password" id="senha-gremio" placeholder="Senha" style="width:100%; margin-bottom:10px;">
            <button onclick="fazerLogin()"
                style="width:100%; background:#27ae60; color:white; border:none; padding:10px; cursor:pointer;">Entrar</button>
            <button onclick="fecharLogin()"
                style="width:100%; background:transparent; border:none; margin-top:5px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <button onclick="abrirLogin()"
        style="position:fixed; bottom:20px; right:20px; border-radius:50%; width:50px; height:50px; background:#2c3e50; color:white; border:none; cursor:pointer;">🔑</button>
    <div id="janela-editar"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; overflow-y:auto; padding:20px; color:white; font-family:sans-serif;">
        <div style="max-width:500px; margin:auto; background:#2c3e50; padding:20px; border-radius:10px;">
            <h2>Editar Evento</h2>

            <input type="hidden" id="edit-id"> <label>Categoria:</label> <input type="text" id="edit-categoria"
                style="width:100%; margin-bottom:10px;">
            <label>Título:</label> <input type="text" id="edit-titulo" style="width:100%; margin-bottom:10px;">
            <label>Descrição:</label> <textarea id="edit-descricao" style="width:100%; margin-bottom:10px;"></textarea>

            <hr>
            <p>Valores por Turma:</p>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>1001: <input type="text" id="edit-v1001" style="width:80%"></div>
                <div>1002: <input type="text" id="edit-v1002" style="width:80%"></div>
                <div>2001: <input type="text" id="edit-v2001" style="width:80%"></div>
                <div>2002: <input type="text" id="edit-v2002" style="width:80%"></div>
                <div>2003: <input type="text" id="edit-v2003" style="width:80%"></div>
                <div>3001: <input type="text" id="edit-v3001" style="width:80%"></div>
                <div>3002: <input type="text" id="edit-v3002" style="width:80%"></div>
                <div>3003: <input type="text" id="edit-v3003" style="width:80%"></div>
            </div>
            <hr>

            <label>Total do Evento:</label> <input type="text" id="edit-valor" style="width:100%; margin-bottom:10px;">
            <label>Justificativa:</label> <input type="text" id="edit-justificativa"
                style="width:100%; margin-bottom:10px;">
            <label>Valor de Saída:</label> <input type="text" id="edit-valorsaida"
                style="width:100%; margin-bottom:10px;">

            <button onclick="salvarAlteracoesNoFirebase()"
                style="background:#27ae60; color:white; padding:10px; border:none; width:100%; margin-top:10px; cursor:pointer;">SALVAR
                TUDO</button>
            <button onclick="document.getElementById('janela-editar').style.display='none'"
                style="background:gray; color:white; padding:5px; border:none; width:100%; margin-top:5px; cursor:pointer;">CANCELAR</button>
        </div>
    </div>
</body>

</html>
